<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBE | Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
}

header h1 {
  color: #38bdf8;
}

nav a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
}

section {
  padding: 50px;
}

.hero {
  text-align: center;
}

.projects {

  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

footer {
  text-align: center;
  padding: 20px;

<body>

<header>

  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Hello, I'm Cobe 👋</h2>
  <p>I am a Web Developer</p>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I build modern websites and web applications.</p>
</section>

<section id="projects">
  <h2>My Projects</h2>
  <div class="projects">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: example@email.com</p>
</section>

<footer>
  <p>© 2026 COBE</p>
</footer>

</body>
</html>
